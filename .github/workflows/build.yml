name: Build Installers

on:
  release:
    types: [created]

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package.json version to release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"; VERSION="${VERSION#.}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build Next.js
        run: pnpm build

      - name: Build Electron (macOS ${{ matrix.arch }})
        run: pnpm exec electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload installers to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(dist/*.dmg dist/*.dmg.blockmap dist/*-mac.zip dist/*-mac.zip.blockmap dist/latest-mac.yml)
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package.json version to release tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"; VERSION="${VERSION#.}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build Next.js
        run: pnpm build

      - name: Build Electron (Windows)
        run: pnpm exec electron-builder --win --publish never

      - name: Upload installers to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(dist/*.exe dist/*.exe.blockmap dist/latest.yml)
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber
